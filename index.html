<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XANAB - Huaraches Artesanales</title>

<style>

body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #f5f1eb;
    color: #2e1b12;
}

/* HEADER */
header {
    text-align: center;
    padding: 40px 20px 20px;
}

header img {
    width: 140px;
}

h1 {
    margin-top: 10px;
    font-size: 22px;
    letter-spacing: 2px;
}

/* FRASE PRINCIPAL */
.hero {
    background-color: #8b5e3c;
    color: white;
    text-align: center;
    padding: 40px 20px;
    font-size: 28px;
    font-weight: 300;
}

/* PRODUCTOS */
.products {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 60px 20px;
    flex-wrap: wrap;
}

.card {
    background: white;
    width: 300px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

.card h2 {
    text-align: center;
    margin: 15px 0 5px;
    font-size: 18px;
    letter-spacing: 1px;
}

.card p {
    text-align: center;
    margin-bottom: 20px;
    font-weight: bold;
}

/* SECCIÓN INFERIOR PRO */
.info {
    background-color: #f5f1eb;
    text-align: center;
    padding: 60px 20px;
}

.info-top {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    font-size: 20px;
    color: #5a3e2b;
}

.info-text {
    max-width: 700px;
    margin: auto;
    font-size: 26px;
    line-height: 1.6;
    color: #3e2a1f;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    font-size: 14px;
}

</style>

</head>

<body>

<header>
    <img src="logo.png">
    <h1>XANAB</h1>
</header>

<section class="hero">
    La tradición no se fabrica, se hereda
</section>

<section class="products">

    <div class="card">
        <img src="tradicional.jpg">
        <h2>TRADICIONAL</h2>
        <p>$450 MXN</p>
    </div>

    <div class="card">
        <img src="moderno.jpg">
        <h2>MODERNO</h2>
        <p>$550 MXN</p>
    </div>

    <div class="card">
        <img src="vestir.jpg">
        <h2>DE VESTIR</h2>
        <p>$650 MXN</p>
    </div>

</section>

<section class="info">

    <div class="info-top">
        <div>📍 <strong>Dolores Hidalgo, Guanajuato</strong></div>
        <div>📦 <strong>Envíos a todo México</strong></div>
    </div>

    <div class="info-text">
        En <strong>XANAB</strong> cada par guarda una historia,<br>
        la esencia de lo hecho a mano<br>
        que se siente en cada paso.
    </div>

</section>

<footer>
    © 2026 XANAB - Huaraches Artesanales
</footer>

</body>
</html>
