<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XANAB</title>

<style>

body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #f5f1eb;
    color: #2e1b12;
}

/* HEADER */
header {
    text-align: center;
    padding: 60px 20px 20px;
}

header img {
    width: 160px;
}

/* FRASE PRINCIPAL */
.hero {
    background-color: #8b5e3c;
    color: white;
    text-align: center;
    padding: 50px 20px;
    font-size: 32px;
    font-weight: 300;
    letter-spacing: 1px;
}

/* PRODUCTOS */
.products {
    display: flex;
    justify-content: center;
    gap: 50px;
    padding: 80px 20px;
    flex-wrap: wrap;
}

.card {
    background: white;
    width: 300px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    background: #ddd;
}

.card h2 {
    text-align: center;
    margin: 20px 0 5px;
    font-size: 18px;
    letter-spacing: 2px;
}

.card p {
    text-align: center;
    margin-bottom: 25px;
    font-weight: bold;
}

/* INFO PRO */
.info {
    text-align: center;
    padding: 80px 20px;
}

.info-top {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin-bottom: 50px;
    flex-wrap: wrap;
    font-size: 20px;
    color: #5a3e2b;
}

.info-text {
    max-width: 750px;
    margin: auto;
    font-size: 30px;
    line-height: 1.7;
    color: #3e2a1f;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    font-size: 14px;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 14px 18px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.whatsapp:hover {
    transform: scale(1.1);
}

</style>

</head>

<body>

<header>
    <img src="logo.png">
</header>

<section class="hero">
    La tradición no se fabrica, se hereda
</section>

<section class="products">

    <div class="card">
        <img src="tradicional.jpg">
        <h2>TRADICIONAL</h2>
        <p>$450 MXN</p>
    </div>

    <div class="card">
        <img src="moderno.jpg">
        <h2>MODERNO</h2>
        <p>$550 MXN</p>
    </div>

    <div class="card">
        <img src="vestir.jpg">
        <h2>DE VESTIR</h2>
        <p>$650 MXN</p>
    </div>

</section>

<section class="info">

    <div class="info-top">
        <div>📍 Dolores Hidalgo, Guanajuato</div>
        <div>📦 Envíos a todo México</div>
    </div>

    <div class="info-text">
        En <strong>XANAB</strong> cada par guarda una historia,<br>
        la esencia de lo hecho a mano<br>
        que se siente en cada paso.
    </div>

</section>

<footer>
    © 2026 XANAB - Huaraches Artesanales
</footer>

<!-- WHATSAPP SOLO UNA VEZ -->
<a class="whatsapp" href="https://wa.me/524111082020" target="_blank">
    WhatsApp
</a>

</body>
</html>
