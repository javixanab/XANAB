<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XANAB - Huaraches Artesanales</title>

<style>
body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f5f1eb;
    color: #2e1b12;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px;
}

header img {
    width: 180px;
}

/* HERO */
.hero {
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: #6b3e26;
    color: #fff;
}

.hero h1 {
    font-size: 48px;
    max-width: 700px;
    line-height: 1.3;
}

/* SECTION */
.section {
    padding: 80px 20px;
    text-align: center;
}

.section p {
    max-width: 600px;
    margin: auto;
    line-height: 1.6;
}

/* GRID PRODUCTOS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
    padding: 40px;
}

.product {
    text-align: center;
}

.product img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

.product h3 {
    margin: 10px 0 5px;
}

.product p {
    margin: 0;
    font-weight: bold;
}

/* BOTÓN */
.btn {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 35px;
    background: black;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" alt="XANAB">
</header>

<!-- HERO -->
<div class="hero">
    <h1>La tradición no se fabrica…<br>se hereda</h1>
</div>

<!-- HISTORIA -->
<div class="section">
    <p>
        En XANAB cada par guarda una historia,<br>
        la esencia de lo hecho a mano<br>
        que se siente en cada paso.
    </p>
</div>

<!-- PRODUCTOS -->
<div class="products">

    <div class="product">
        <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba3" alt="">
        <h3>TRADICIONAL</h3>
        <p>$450 MXN</p>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1582582429416-29a33b2cdb1e" alt="">
        <h3>MODERNO</h3>
        <p>$550 MXN</p>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1593032465175-481ac7f401e0" alt="">
        <h3>DE VESTIR</h3>
        <p>$650 MXN</p>
    </div>

</div>

<!-- CTA -->
<div class="section">
    <a class="btn" href="https://wa.me/524111082020">
        COTIZA POR WHATSAPP
    </a>
</div>

<footer>
    <p>Dolores Hidalgo, Guanajuato</p>
    <p>Envíos a todo México</p>
</footer>

</body>
</html>
